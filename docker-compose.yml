services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: gpuoj
      POSTGRES_USER: gpuoj
      POSTGRES_PASSWORD: gpuoj
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gpuoj"]
      interval: 5s
      timeout: 5s
      retries: 10

  kafka:
    image: apache/kafka:3.7.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9091,INTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9091
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD", "/opt/kafka/bin/kafka-topics.sh", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 10

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: gpuoj
      DB_USER: gpuoj
      DB_PASS: gpuoj
      KAFKA_BOOTSTRAP: kafka:29092
      JWT_SECRET: local-dev-secret-change-in-prod!!
      PROBLEMS_LOCAL_PATH: /problems
    volumes:
      - ./problems:/problems:ro
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile.worker
    environment:
      - KAFKA_BOOTSTRAP=kafka:29092
    command:
      - --kafka
      - kafka:29092
      - --problems-dir
      - /problems
    volumes:
      - ./problems:/problems:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp/gpuoj:/tmp/gpuoj
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    depends_on:
      kafka:
        condition: service_healthy

volumes:
  postgres-data:
